[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/download/sentinelai"
  to = "/.netlify/functions/download-sentinelai"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/analytics"
  to = "/.netlify/functions/admin-analytics"
  status = 200
  force = true

[[redirects]]
  from = "/api/:splat"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200
