<!doctype html>
<html lang="en">
  <head>
<title>Care Admin &mdash; AI Tech Support Operations</title>
<meta name="description" content="Care admin manages AI tech support tickets, subscribers, escalations, customer details, support plans, remote help, and operations securely online.">
<link rel="canonical" href="https://sentinelprime.org/care/admin">
<meta property="og:title" content="Care Admin &mdash; AI Tech Support Operations">
<meta property="og:description" content="Care admin manages AI tech support tickets, subscribers, escalations, customer details, support plans, remote help, and operations securely online.">
<meta property="og:image" content="https://sentinelprime.org/assets/logo-tesseract.svg">
<meta property="og:url" content="https://sentinelprime.org/care/admin">
<meta property="og:type" content="website">
<meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/care/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/care"><span class="brand-mark">S</span><span>Care Admin</span></a>
      <nav class="nav-links"><a href="https://finance.sentinelprime.org">Finance</a><button id="adminSignOutButton" class="button button-small hidden">Sign out</button></nav>
    </header>

    <main class="section narrow">
      <section id="adminAuthPanel" class="glass-card auth-card">
        <p class="eyebrow">Protected admin</p>
        <h1>Care Admin Sign In</h1>
        <p>Use the same credentials as sentinelprime.org/admin. If you're already logged in there, refresh this page.</p>
        <form id="adminAuthForm" class="stacked-form">
          <label for="adminEmail">Email address</label>
          <input id="adminEmail" name="email" type="email" autocomplete="username" required placeholder="paul@sentinelprime.org" />
          <label for="adminPassword">Password</label>
          <input id="adminPassword" name="password" type="password" autocomplete="current-password" required placeholder="Enter password" />
          <button class="button" type="submit">Sign in</button>
        </form>
        <div id="adminAuthStatus" class="notice hidden"></div>
      </section>

      <section id="adminPanel" class="hidden admin-panel">
        <div class="split-section">
          <div>
            <p class="eyebrow">Operations</p>
            <h2>Open escalation tickets</h2>
          </div>
          <button id="refreshAdmin" class="button button-secondary">Refresh</button>
        </div>
        <div id="statsGrid" class="stats-grid"></div>
        <div id="ticketsList" class="ticket-list"></div>
      </section>
    </main>

    <script type="module" src="/care/js/admin.js"></script>
  </body>
</html>
