<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Sentinel Prime to discuss web development, growth systems, custom software, and IT services for your business.">
  <meta name="keywords" content="contact web development agency, custom software quote, IT services consultation">
  <meta property="og:title" content="Contact Sentinel Prime">
  <meta property="og:description" content="Tell us what you need built and we will map the right digital and technical solution.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sentinelprime.org/contact.html">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <title>Contact | Sentinel Prime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="contact">
  <div id="site-header"></div>

  <main>
    <section class="section-pad">
      <div class="container contact-grid">
        <div class="reveal">
          <p class="eyebrow">Contact</p>
          <h1>Tell Us What You Need Built</h1>
          <p>Tell us about your business and we’ll recommend the right mix of website, systems, software, and technical support.</p>
          <p>We respond with a practical implementation plan and clear next steps.</p>
          <p><a href="mailto:customerservice@sentinelprime.org">customerservice@sentinelprime.org</a></p>
        </div>

        <form class="contact-form reveal glass" name="contact" method="POST" data-netlify="true">
          <input type="hidden" name="form-name" value="contact">
          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required>
          </div>
          <div class="field">
            <label for="email">Email (required)</label>
            <input id="email" name="email" type="email" required>
          </div>
          <div class="field">
            <label for="business-name">Business Name</label>
            <input id="business-name" name="business-name" type="text">
          </div>
          <div class="field">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="What do you need built or improved? Include your timeline and any technical challenges."></textarea>
          </div>
          <button class="btn btn-primary full" type="submit">Send My Request</button>
        </form>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/site-config.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
