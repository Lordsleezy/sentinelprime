<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Try Sentinel — private AI web chat powered by Sentinel Prime.">
  <title>Try Sentinel | Web Chat</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index-landing.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body class="il-body" data-page="jarvis">
  <div id="webgl-root" aria-hidden="true"></div>
  <div class="il-wrap jarvis-app-layout">
    <div id="site-header"></div>

    <main class="jarvis-app-main shell-main" style="padding-top:5.25rem">
      <div class="jarvis-terminal il-reveal">
        <header class="jarvis-terminal__head">
          <h1 class="jarvis-terminal__title">SENTINEL</h1>
          <span class="jarvis-terminal__badge">WEB CHAT · AI</span>
        </header>
        <section id="sentinel-chat-window" aria-live="polite"></section>
        <div class="jarvis-input-row">
          <span class="prompt">&gt;&gt;&gt;</span>
          <input id="sentinel-chat-input" type="text" maxlength="4000" autocomplete="off" placeholder="Message Sentinel…" aria-label="Message">
          <button type="button" class="jarvis-send-btn" id="sentinel-chat-send">Send</button>
        </div>
      </div>
    </main>

    <div id="site-footer"></div>
  </div>

  <script type="module" src="js/index-tesseract.js"></script>
  <script src="js/site-config.js"></script>
  <script src="js/components.js"></script>
  <script src="js/shell.js" defer></script>
  <script>
  (function () {
    const API = "https://jarvis-0sbo.onrender.com/api/chat";
    const win = document.getElementById("sentinel-chat-window");
    const inp = document.getElementById("sentinel-chat-input");
    const btn = document.getElementById("sentinel-chat-send");

    fetch("https://jarvis-0sbo.onrender.com/").catch(function () {});

    function addMsg(role, text, typewriter) {
      const row = document.createElement("div");
      row.className = "jarvis-msg " + role;
      const pre = document.createElement("span");
      pre.className = "jarvis-prefix";
      pre.textContent = role === "user" ? "> " : role === "bot" ? "SENTINEL :: " : "[ SYSTEM ] ";
      const bod = document.createElement("span");
      bod.className = "jarvis-body";
      row.appendChild(pre);
      row.appendChild(bod);
      win.appendChild(row);
      win.scrollTop = win.scrollHeight;

      if (role === "bot" && typewriter !== false) {
        return new Promise(function (res) {
          var i = 0;
          function tick() {
            if (i >= text.length) {
              win.scrollTop = win.scrollHeight;
              res();
              return;
            }
            bod.textContent = text.slice(0, ++i);
            win.scrollTop = win.scrollHeight;
            requestAnimationFrame(tick);
          }
          tick();
        });
      }
      bod.textContent = text;
      return Promise.resolve();
    }

    function setBusy(on) {
      inp.disabled = on;
      btn.disabled = on;
    }

    async function send() {
      var msg = inp.value.trim();
      if (!msg) return;
      addMsg("user", msg);
      inp.value = "";
      setBusy(true);
      try {
        var r = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg })
        });
        var p = await r.json();
        if (!r.ok) throw new Error(p.error || "HTTP " + r.status);
        await addMsg("bot", p.response);
      } catch (err) {
        addMsg("system", "Error: " + err.message, false);
      } finally {
        setBusy(false);
        inp.focus();
      }
    }

    btn.addEventListener("click", send);
    inp.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        send();
      }
    });

    addMsg("bot", "Hi — I'm Sentinel. Ask me anything.", false);
    inp.focus();

    var opener = sessionStorage.getItem("jarvis_opener");
    if (opener) {
      sessionStorage.removeItem("jarvis_opener");
      setTimeout(async function () {
        addMsg("user", opener);
        setBusy(true);
        try {
          var r = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: opener })
          });
          var p = await r.json();
          if (!r.ok) throw new Error(p.error || "HTTP " + r.status);
          await addMsg("bot", p.response);
        } catch (err) {
          addMsg("system", "Error: " + err.message, false);
        } finally {
          setBusy(false);
          inp.focus();
        }
      }, 400);
    }
  })();
  </script>
</body>
</html>
