<!DOCTYPE html>
<html lang="en">
<head>
<title>Sentinel Prime Checkout &mdash; Secure Privacy-First Tech Plans</title>
<meta name="description" content="Sentinel Prime checkout lets you choose a privacy-first tech plan, start free, or buy Sentinel AI securely with Stripe-powered payment today online now.">
<link rel="canonical" href="https://sentinelprime.org/checkout">
<meta property="og:title" content="Sentinel Prime Checkout &mdash; Secure Privacy-First Tech Plans">
<meta property="og:description" content="Sentinel Prime checkout lets you choose a privacy-first tech plan, start free, or buy Sentinel AI securely with Stripe-powered payment today online now.">
<meta property="og:image" content="https://sentinelprime.org/assets/logo-tesseract.svg">
<meta property="og:url" content="https://sentinelprime.org/checkout">
<meta property="og:type" content="website">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="page.css">
</head>
<body>
<nav class="nav">
  <a class="logo" href="index.html">SENTINELPRIME</a>
  <div class="nav-links"><a href="pricing.html">Pricing</a></div>
</nav>
<main>
  <section class="page-hero">
    <div class="wrap narrow">
      <h1 id="planTitle">Sentinel Prime Secure Checkout</h1>
      <p class="lead" id="planLead">Secure payment via Stripe.</p>
    </div>
  </section>
  <section class="section">
    <div class="wrap narrow form-panel">
      <form id="checkoutForm">
        <input required type="email" id="email" placeholder="Email (must match account)">
        <button class="button" type="submit" id="payBtn">Continue to Stripe</button>
        <div class="form-status" id="status"></div>
      </form>
      <p class="copy" style="margin-top:16px;">Need an account? <a href="signup.html">Sign up</a> first for dashboard access.</p>
    </div>
  </section>
</main>
<footer>
  <div class="footer-links"><a href="/privacy">Privacy</a><a href="/terms">Terms</a><a href="/contact">Support</a></div>
  <div>&copy; 2024 Sentinel Prime Inc. &middot; Founded 2024 &middot; Established 2026</div>
</footer>
<script>
const params = new URLSearchParams(location.search);
const plan = params.get("plan") || "annual";
const labels = { monthly: "Monthly — $19.99/mo", annual: "Annual — $199/yr", lifetime: "Lifetime — $499" };
document.getElementById("planTitle").textContent = "SentinelAI Pro — " + (labels[plan] || plan);
document.getElementById("planLead").textContent = labels[plan] || "";
const storedEmail = localStorage.getItem("sentinel_email");
if (storedEmail) document.getElementById("email").value = storedEmail;

document.getElementById("checkoutForm").addEventListener("submit", async e => {
  e.preventDefault();
  const st = document.getElementById("status");
  st.textContent = "Redirecting to Stripe…";
  const email = document.getElementById("email").value;
  try {
    const r = await fetch("/api/checkout/session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        plan,
        email,
        user_id: localStorage.getItem("sentinel_user_id") || undefined,
      }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || "Checkout failed");
    if (d.url) location.href = d.url;
    else throw new Error("No checkout URL");
  } catch (err) {
    st.className = "form-status error";
    st.textContent = err.message;
  }
});
</script>
<script defer src="js/site-shell.js"></script>
<script defer src="nav.js"></script>
</body>
</html>
