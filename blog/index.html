<!DOCTYPE html>
<html lang="en">
<head>
<title>Sentinel Prime Blog &mdash; Tech Guides, Privacy Tips &amp; Linux Help</title>
<meta name="description" content="Expert tech guides from Sentinel Prime: Linux tutorials, Windows tips, privacy protection, affordable PC advice, and free alternatives to expensive tech services.">
<link rel="canonical" href="https://sentinelprime.org/blog">
<meta property="og:title" content="Sentinel Prime Blog &mdash; Tech Guides, Privacy Tips &amp; Linux Help">
<meta property="og:description" content="Expert tech guides from Sentinel Prime: Linux tutorials, Windows tips, privacy protection, affordable PC advice, and free alternatives to expensive tech services.">
<meta property="og:image" content="https://sentinelprime.org/assets/logo-tesseract.svg">
<meta property="og:url" content="https://sentinelprime.org/blog">
<meta property="og:type" content="website">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/page.css">
<style>
.blog-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 24px;
  margin-top: 48px;
}
.blog-card {
  border: 1px solid rgba(20,184,166,0.18);
  border-radius: 8px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(18px);
  padding: 28px 26px 24px;
  display: flex;
  flex-direction: column;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.blog-card:hover {
  border-color: rgba(20,184,166,0.5);
  box-shadow: 0 0 28px rgba(20,184,166,0.12);
}
.blog-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.blog-category {
  padding: 4px 10px;
  border: 1px solid rgba(255,153,68,0.4);
  color: #ff9944;
  font: 700 0.65rem "Share Tech Mono", monospace;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.blog-date {
  color: rgba(255,255,255,0.38);
  font: 400 0.68rem "Share Tech Mono", monospace;
  letter-spacing: 0.1em;
}
.blog-card h2 {
  font: 700 1.18rem / 1.3 "Syne", sans-serif;
  margin: 0 0 12px;
  color: #fff;
}
.blog-excerpt {
  color: rgba(255,255,255,0.62);
  font: 400 0.84rem / 1.65 "Share Tech Mono", monospace;
  margin: 0 0 20px;
  flex: 1;
}
.blog-read-more {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: var(--hud-blue, #14b8a6);
  font: 600 0.74rem "Share Tech Mono", monospace;
  letter-spacing: 0.14em;
  text-decoration: none;
  text-transform: uppercase;
  margin-top: auto;
  transition: gap 0.2s;
}
.blog-read-more:hover { gap: 12px; color: #fff; }
.blog-read-more::after { content: "→"; }

.blog-loading {
  text-align: center;
  padding: 80px 20px;
  color: rgba(255,255,255,0.44);
  font: 400 0.88rem "Share Tech Mono", monospace;
  letter-spacing: 0.12em;
}
.blog-empty {
  text-align: center;
  padding: 80px 20px;
}
.blog-empty h2 {
  font: 700 1.4rem "Syne", sans-serif;
  color: rgba(255,255,255,0.55);
  margin-bottom: 12px;
}
.blog-empty p {
  color: rgba(255,255,255,0.38);
  font: 400 0.84rem "Share Tech Mono", monospace;
}
.blog-hero-sub {
  margin-top: 18px;
  color: rgba(255,255,255,0.55);
  font: 400 0.9rem "Share Tech Mono", monospace;
  letter-spacing: 0.06em;
}
@media (max-width: 700px) {
  .blog-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body data-page="blog">
<div id="global-nav-mount"></div>

<main>
  <section class="page-hero" style="min-height:44vh">
    <div class="wrap narrow">
      <p class="eyebrow">Sentinel Prime // Knowledge Base</p>
      <h1>The Blog</h1>
      <p class="lead">Practical tech guides. Privacy-first advice. No fluff, no paywalls.</p>
      <p class="blog-hero-sub">Linux &bull; Windows &bull; Security &bull; Refurb Deals &bull; AI Tools</p>
    </div>
  </section>

  <section class="section" style="padding-top:0">
    <div class="wrap">
      <div id="blog-container">
        <div class="blog-loading">[ LOADING ARTICLES... ]</div>
      </div>
    </div>
  </section>
</main>

<footer>
  <div class="footer-links">
    <a href="/">Home</a>
    <a href="/products">Products</a>
    <a href="/blog">Blog</a>
    <a href="/care">Care</a>
    <a href="/contact">Contact</a>
    <a href="/privacy">Privacy</a>
    <a href="/terms">Terms</a>
  </div>
  &copy; 2025 Sentinel Prime Inc. &mdash; Privacy-First Tech
</footer>

<script src="/js/global-nav.js"></script>
<script>
(function () {
  var container = document.getElementById('blog-container');

  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    } catch(e) { return ''; }
  }

  function renderPosts(posts) {
    if (!posts || posts.length === 0) {
      container.innerHTML = '<div class="blog-empty"><h2>No articles yet.</h2><p>Check back soon &mdash; new content publishes weekly.</p></div>';
      return;
    }
    var grid = '<div class="blog-grid">';
    posts.forEach(function(p) {
      grid += '<article class="blog-card">' +
        '<div class="blog-meta">' +
        (p.category ? '<span class="blog-category">' + escHtml(p.category) + '</span>' : '') +
        '<span class="blog-date">' + formatDate(p.created_at) + '</span>' +
        '</div>' +
        '<h2>' + escHtml(p.title) + '</h2>' +
        '<p class="blog-excerpt">' + escHtml(p.excerpt || '') + '</p>' +
        '<a class="blog-read-more" href="/blog/' + escHtml(p.slug) + '">Read Article</a>' +
        '</article>';
    });
    grid += '</div>';
    container.innerHTML = grid;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  fetch('/api/get-blog-posts')
    .then(function(r) {
      return r.json().then(function(data) {
        if (!r.ok) throw new Error(data.error || 'request failed');
        return data;
      });
    })
    .then(function(data) {
      var posts = data && data.posts;
      if (!Array.isArray(posts)) throw new Error('invalid response');
      renderPosts(posts);
    })
    .catch(function() {
      container.innerHTML = '<div class="blog-empty"><h2>Could not load articles.</h2><p>Please try again in a moment.</p></div>';
    });
})();
</script>
</body>
</html>
