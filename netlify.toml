[build]
  command = "npm install --include=dev && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions."blog-weekly"]
  schedule = "0 9 * * 1"

[[redirects]]
  from = "/care"
  to = "/care/index.html"
  status = 200

[[redirects]]
  from = "/care/checkout"
  to = "/care/checkout.html"
  status = 200

[[redirects]]
  from = "/care/portal"
  to = "/care/portal.html"
  status = 200

[[redirects]]
  from = "/care/admin"
  to = "/care/admin.html"
  status = 200

[[redirects]]
  from = "/care/api/config"
  to = "/.netlify/functions/care-config"
  status = 200
  force = true

[[redirects]]
  from = "/care/api/checkout"
  to = "/.netlify/functions/care-checkout"
  status = 200
  force = true

[[redirects]]
  from = "/care/api/webhook"
  to = "/.netlify/functions/care-webhook"
  status = 200
  force = true

[[redirects]]
  from = "/care/api/notify"
  to = "/.netlify/functions/care-notify"
  status = 200
  force = true

[[redirects]]
  from = "/care/api/customer-profile"
  to = "/.netlify/functions/care-profile"
  status = 200
  force = true

[[redirects]]
  from = "/care/api/track-interaction"
  to = "/.netlify/functions/care-track"
  status = 200
  force = true

[[redirects]]
  from = "/care/api/admin-data"
  to = "/.netlify/functions/care-admin-data"
  status = 200
  force = true

[[redirects]]
  from = "/care/api/resolve-ticket"
  to = "/.netlify/functions/care-resolve-ticket"
  status = 200
  force = true

[[redirects]]
  from = "/care/api/chat"
  to = "/.netlify/functions/care-chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/analytics"
  to = "/.netlify/functions/admin-analytics"
  status = 200
  force = true

[[redirects]]
  from = "/api/:splat"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/blog"
  to = "/blog/index.html"
  status = 200

[[redirects]]
  from = "/blog/:slug"
  to = "/blog/post.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/products"
  to = "/products.html"
  status = 200

[[redirects]]
  from = "/prospects"
  to = "https://prospects.sentinelprime.org"
  status = 302
  force = true

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200
