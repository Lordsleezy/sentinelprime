<!DOCTYPE html>
<html lang="en">
<head>
<title>Sentinel Prime Dashboard &mdash; Manage Privacy-First Tech Access</title>
<meta name="description" content="Sentinel Prime dashboard helps customers manage privacy-first tech access, activation keys, product downloads, billing, and subscription status today.">
<link rel="canonical" href="https://sentinelprime.org/dashboard">
<meta property="og:title" content="Sentinel Prime Dashboard &mdash; Manage Privacy-First Tech Access">
<meta property="og:description" content="Sentinel Prime dashboard helps customers manage privacy-first tech access, activation keys, product downloads, billing, and subscription status today.">
<meta property="og:image" content="https://sentinelprime.org/assets/logo-tesseract.svg">
<meta property="og:url" content="https://sentinelprime.org/dashboard">
<meta property="og:type" content="website">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="page.css">
</head>
<body data-page="dashboard">
<div id="global-nav-mount"></div>
<main>
  <section class="section">
    <div class="wrap">
      <h1>Sentinel Prime Customer Dashboard</h1>
      <p class="copy" id="userLine">Loading…</p>
      <div class="grid-2" style="margin-top:24px;">
        <div class="panel">
          <h2>Subscriptions</h2>
          <div id="subs">—</div>
        </div>
        <div class="panel">
          <h2>License keys</h2>
          <div id="licenses">—</div>
          <p class="copy" style="margin-top:12px;">Enter your key in the Sentinel AI setup wizard after install.</p>
        </div>
      </div>
      <div class="panel" style="margin-top:20px;">
        <h2>Payment history</h2>
        <div id="payments">—</div>
      </div>
    </div>
  </section>
</main>
<footer>
  <div class="footer-links"><a href="/privacy">Privacy</a><a href="/terms">Terms</a><a href="/contact">Support</a></div>
  <div>&copy; 2024 Sentinel Prime Inc. &middot; Founded 2024 &middot; Established 2026</div>
</footer>
<script>
const uid = localStorage.getItem("sentinel_user_id");
if (!uid) location.href = "login.html";
document.getElementById("userLine").textContent = "User: " + (localStorage.getItem("sentinel_email") || uid);
fetch("/api/dashboard?user_id=" + encodeURIComponent(uid)).then(r => r.json()).then(d => {
  if (!d.ok && d.error) throw new Error(d.error);
  document.getElementById("subs").innerHTML = (d.subscriptions || []).length
    ? d.subscriptions.map(s => `<p>${s.plan} — <strong>${s.status}</strong></p>`).join("")
    : "<p class='copy'>No active subscription</p>";
  document.getElementById("licenses").innerHTML = (d.licenses || []).length
    ? d.licenses.map(l => `<p><code>${l.license_key}</code> ${l.activated_at ? "(activated)" : "(pending)"}</p>`).join("")
    : "<p class='copy'>Purchase a plan to receive a license key by email.</p>";
  document.getElementById("payments").innerHTML = (d.payments || []).length
    ? "<ul>" + d.payments.map(p => `<li>${p.plan} $${(p.amount_cents/100).toFixed(2)} — ${p.status}</li>`).join("") + "</ul>"
    : "<p class='copy'>No payments yet</p>";
}).catch(e => {
  document.getElementById("subs").textContent = e.message;
});
</script>
<script defer src="js/site-shell.js"></script>
<script defer src="nav.js"></script>
</body>
</html>
