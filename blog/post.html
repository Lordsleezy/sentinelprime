<!DOCTYPE html>
<html lang="en">
<head>
<title id="doc-title">Sentinel Prime Blog</title>
<meta name="description" id="doc-desc" content="Tech guides and privacy tips from Sentinel Prime.">
<link rel="canonical" id="doc-canonical" href="https://sentinelprime.org/blog">
<meta property="og:title" id="og-title" content="Sentinel Prime Blog">
<meta property="og:description" id="og-desc" content="Tech guides and privacy tips from Sentinel Prime.">
<meta property="og:image" content="https://sentinelprime.org/assets/logo-tesseract.svg">
<meta property="og:url" id="og-url" content="https://sentinelprime.org/blog">
<meta property="og:type" content="article">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/page.css">
<style>
.post-wrapper {
  max-width: 820px;
  margin: 0 auto;
}
.post-header {
  margin-bottom: 48px;
}
.post-meta {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}
.post-category {
  padding: 4px 10px;
  border: 1px solid rgba(255,153,68,0.4);
  color: #ff9944;
  font: 700 0.65rem "Share Tech Mono", monospace;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.post-date {
  color: rgba(255,255,255,0.38);
  font: 400 0.72rem "Share Tech Mono", monospace;
  letter-spacing: 0.1em;
}
.post-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--hud-blue, #14b8a6);
  font: 400 0.72rem "Share Tech Mono", monospace;
  letter-spacing: 0.12em;
  text-decoration: none;
  text-transform: uppercase;
  margin-bottom: 32px;
}
.post-back::before { content: "←"; }
.post-back:hover { color: #fff; }
.post-title {
  font: 800 clamp(2rem, 5vw, 4rem) / 1.05 "Syne", sans-serif;
  margin: 0 0 20px;
  text-shadow: 0 0 42px rgba(255,255,255,0.18);
}
.post-excerpt {
  font: 400 1.05rem / 1.7 "Share Tech Mono", monospace;
  color: rgba(255,255,255,0.62);
  margin: 0;
  border-left: 2px solid rgba(20,184,166,0.45);
  padding-left: 20px;
}
.post-body {
  color: rgba(255,255,255,0.82);
  font: 400 1rem / 1.78 "Share Tech Mono", monospace;
}
.post-body h1, .post-body h2, .post-body h3 {
  font-family: "Syne", sans-serif;
  color: #fff;
  margin: 2.2rem 0 0.8rem;
}
.post-body h1 { font-size: clamp(1.6rem, 3.5vw, 2.6rem); font-weight: 800; }
.post-body h2 { font-size: clamp(1.3rem, 2.8vw, 2rem); font-weight: 700; }
.post-body h3 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--hud-blue, #14b8a6); }
.post-body p { margin: 0 0 1.3rem; }
.post-body a {
  color: var(--hud-blue, #14b8a6);
  text-decoration: underline;
  text-underline-offset: 3px;
}
.post-body a:hover { color: #fff; }
.post-body ul, .post-body ol {
  padding-left: 24px;
  margin: 0 0 1.3rem;
}
.post-body li { margin-bottom: 6px; }
.post-body strong { color: #fff; }
.post-body em { color: rgba(255,255,255,0.72); font-style: italic; }
.post-body blockquote {
  margin: 1.5rem 0;
  padding: 16px 22px;
  border-left: 3px solid rgba(20,184,166,0.55);
  background: rgba(20,184,166,0.04);
  color: rgba(255,255,255,0.7);
  font-style: italic;
}
.post-body code {
  background: rgba(20,184,166,0.1);
  border: 1px solid rgba(20,184,166,0.2);
  padding: 2px 7px;
  border-radius: 3px;
  font-size: 0.88em;
}
.post-body pre {
  background: rgba(0,0,5,0.72);
  border: 1px solid rgba(20,184,166,0.2);
  padding: 18px 20px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 1.3rem 0;
}
.post-body pre code {
  background: none;
  border: none;
  padding: 0;
}
.post-divider {
  border: none;
  border-top: 1px solid rgba(20,184,166,0.15);
  margin: 48px 0;
}
.post-cta {
  border: 1px solid rgba(20,184,166,0.22);
  border-radius: 8px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(18px);
  padding: 32px 28px;
  margin-top: 48px;
  text-align: center;
}
.post-cta .eyebrow { justify-content: center; display: block; }
.post-cta h3 {
  font: 700 1.5rem "Syne", sans-serif;
  color: #fff;
  margin: 12px 0 10px;
  text-transform: none;
  letter-spacing: 0;
}
.post-cta p {
  color: rgba(255,255,255,0.6);
  font: 400 0.88rem / 1.6 "Share Tech Mono", monospace;
  margin: 0 0 22px;
}
.post-loading {
  text-align: center;
  padding: 120px 20px;
  color: rgba(255,255,255,0.44);
  font: 400 0.88rem "Share Tech Mono", monospace;
  letter-spacing: 0.12em;
}
.post-not-found {
  text-align: center;
  padding: 80px 20px;
}
.post-not-found h2 {
  font: 700 2rem "Syne", sans-serif;
  margin-bottom: 14px;
}
.post-not-found p {
  color: rgba(255,255,255,0.5);
  font: 400 0.9rem "Share Tech Mono", monospace;
}
</style>
</head>
<body data-page="blog">
<div id="global-nav-mount"></div>

<main>
  <section class="section" style="padding-top:130px">
    <div class="wrap">
      <div id="post-container">
        <div class="post-loading">[ LOADING ARTICLE... ]</div>
      </div>
    </div>
  </section>
</main>

<footer>
  <div class="footer-links">
    <a href="/">Home</a>
    <a href="/products">Products</a>
    <a href="/blog">Blog</a>
    <a href="/care">Care</a>
    <a href="/contact">Contact</a>
    <a href="/privacy">Privacy</a>
    <a href="/terms">Terms</a>
  </div>
  &copy; 2025 Sentinel Prime Inc. &mdash; Privacy-First Tech
</footer>

<script src="/js/global-nav.js"></script>
<script>
(function () {
  var container = document.getElementById('post-container');

  function getSlug() {
    var path = window.location.pathname;
    var parts = path.split('/').filter(Boolean);
    return parts[parts.length - 1] || '';
  }

  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    } catch(e) { return ''; }
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function markdownToHtml(md) {
    if (!md) return '';
    var html = md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/^#{1}\s+(.+)$/gm, '<h1>$1</h1>')
      .replace(/^#{2}\s+(.+)$/gm, '<h2>$1</h2>')
      .replace(/^#{3}\s+(.+)$/gm, '<h3>$1</h3>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
      .replace(/^---$/gm, '<hr class="post-divider">')
      .replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, function(m) { return '<ul>' + m + '</ul>'; })
      .replace(/\n\n/g, '</p><p>')
      .replace(/^(?!<[h1-6ulhriblock])(.+)$/gm, function(line) {
        if (line.trim() === '') return '';
        if (/^<(h[1-6]|ul|ol|li|hr|blockquote|pre|p)/.test(line)) return line;
        return line;
      });
    var lines = html.split('\n');
    var result = [];
    var inPara = false;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) {
        if (inPara) { result.push('</p>'); inPara = false; }
        continue;
      }
      if (/^<(h[1-6]|ul|ol|li|hr|blockquote|pre)/.test(line)) {
        if (inPara) { result.push('</p>'); inPara = false; }
        result.push(line);
      } else {
        if (!inPara) { result.push('<p>'); inPara = true; }
        result.push(line);
      }
    }
    if (inPara) result.push('</p>');
    return result.join('\n');
  }

  function renderPost(post) {
    var url = 'https://sentinelprime.org/blog/' + post.slug;
    document.getElementById('doc-title').textContent = post.title + ' — Sentinel Prime Blog';
    document.getElementById('doc-desc').setAttribute('content', post.excerpt || post.title);
    document.getElementById('doc-canonical').setAttribute('href', url);
    document.getElementById('og-title').setAttribute('content', post.title);
    document.getElementById('og-desc').setAttribute('content', post.excerpt || '');
    document.getElementById('og-url').setAttribute('content', url);

    container.innerHTML =
      '<div class="post-wrapper">' +
      '<a class="post-back" href="/blog">Back to Blog</a>' +
      '<header class="post-header">' +
      '<div class="post-meta">' +
      (post.category ? '<span class="post-category">' + escHtml(post.category) + '</span>' : '') +
      '<span class="post-date">' + formatDate(post.created_at) + '</span>' +
      '</div>' +
      '<h1 class="post-title">' + escHtml(post.title) + '</h1>' +
      (post.excerpt ? '<p class="post-excerpt">' + escHtml(post.excerpt) + '</p>' : '') +
      '</header>' +
      '<hr class="post-divider">' +
      '<div class="post-body">' + markdownToHtml(post.content) + '</div>' +
      '<div class="post-cta">' +
      '<p class="eyebrow">Sentinel Prime</p>' +
      '<h3>Need real hands-on tech support?</h3>' +
      '<p>Sentinel Care gives you expert tech help, privacy-first AI, and device support &mdash; starting at $19.99/month. No wait times, no Geek Squad prices.</p>' +
      '<a href="/care" class="button">Explore Sentinel Care</a>' +
      '</div>' +
      '</div>';
  }

  var slug = getSlug();
  if (!slug || slug === 'blog') {
    window.location.href = '/blog';
    return;
  }

  fetch('/api/get-blog-post?slug=' + encodeURIComponent(slug))
    .then(function(r) {
      if (!r.ok) throw new Error('not found');
      return r.json();
    })
    .then(function(data) {
      var post = data.post || data;
      if (!post || !post.title) throw new Error('no post');
      renderPost(post);
    })
    .catch(function() {
      container.innerHTML =
        '<div class="post-not-found">' +
        '<a class="post-back" href="/blog">Back to Blog</a>' +
        '<h2>Article Not Found</h2>' +
        '<p>This article may have moved or been removed.</p>' +
        '<a href="/blog" class="button" style="margin-top:20px">Browse All Articles</a>' +
        '</div>';
    });
})();
</script>
</body>
</html>
