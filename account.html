<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>My Account - Sentinel Prime</title><meta name="robots" content="noindex,nofollow"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="page.css"></head>
<body><nav class="nav"><a class="logo" href="/">SENTINELPRIME</a><button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false"><span></span></button><div class="nav-links"><a href="/pricing">Pricing</a><a href="/download">Download</a><a href="/contact">Contact</a><a class="nav-cta" href="/download">Start Free Trial &rarr;</a></div></nav><main><section class="page-hero"><div class="wrap narrow"><p class="eyebrow">My Sentinel Account</p><h1>Private by default.</h1><p class="lead">View your plan, recover your activation code, and manage billing.</p></div></section><section class="section"><div class="wrap"><div class="panel" id="accountPanel"><p class="copy">Loading account...</p></div></div></section></main><footer><div class="footer-links"><a href="/">Home</a><a href="/pricing">Pricing</a><a href="/contact">Contact</a></div><div>&copy; 2026 Sentinel Prime Inc. - AI built for YOU</div></footer><script src="js/site-shell.js"></script>
<script src="nav.js"></script><script>
const panel=document.getElementById("accountPanel");const escapeHtml=value=>String(value||"").replace(/[&<>\"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char]));async function load(){const response=await fetch("/api/account");if(response.status===401){panel.innerHTML='<h2>Login required.</h2><p class="copy">Sign in to view your subscription and saved activation codes.</p><div class="buttons"><a class="button" href="/login">Login</a></div>';return}const data=await response.json();if(!response.ok){panel.innerHTML=`<h2>Account service coming online.</h2><p class="copy">${escapeHtml(data.error)}</p>`;return}const sub=data.subscriptions[0];const code=data.codes[0];panel.innerHTML=`<p class="eyebrow">Signed In</p><h2>${escapeHtml(data.user.email)}</h2><p class="copy">Plan: ${escapeHtml(sub?.plan||"No paid plan")} ${sub?.status?`- ${escapeHtml(sub.status)}`:""}</p><div class="panel"><p class="eyebrow">Your Activation Code</p><p class="code-value">${escapeHtml(code?.code||"No activation code saved yet.")}</p>${code?'<button class="button mini-button" id="copyCode">Copy</button>':""}</div><div class="buttons">${sub?.stripe_customer_id?'<button class="button" id="billing">Manage Billing</button>':""}<a class="button secondary" href="/download">Download Sentinel AI</a><button class="button secondary" id="logout">Logout</button></div>`;document.getElementById("copyCode")?.addEventListener("click",()=>navigator.clipboard.writeText(code.code));document.getElementById("logout").onclick=async()=>{await fetch("/api/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:'{"action":"logout"}'});location.href="/login"};document.getElementById("billing")?.addEventListener("click",async()=>{const response=await fetch("/api/create-portal",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({customer_id:sub.stripe_customer_id})});const result=await response.json();if(result.url)location.href=result.url})}load();
</script></body></html>
