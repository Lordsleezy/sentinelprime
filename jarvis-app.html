<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sentinel AI — web assistant by Sentinel Prime.">
  <title>Sentinel AI</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/jarvis-app.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body class="sentinel-ai-standalone">
  <div id="webgl-root" aria-hidden="true"></div>

  <div id="sentinel-intro" class="sentinel-intro">
    <div class="sentinel-intro__inner">
      <h1 class="sentinel-intro__brand">SENTINEL</h1>
      <p class="sentinel-intro__tag">Personal AI — Sentinel Prime</p>
      <button type="button" class="sentinel-intro__begin" id="sentinel-begin">Begin</button>
    </div>
  </div>

  <div id="sentinel-chat-root" class="sentinel-chat-root" aria-hidden="true">
    <header class="sentinel-chat-header">
      <div class="sentinel-chat-header__spacer" aria-hidden="true"></div>
      <div class="sentinel-chat-header__titles">
        <h1 class="sentinel-chat-header__title">Sentinel</h1>
        <p class="sentinel-chat-header__sub">Sentinel Prime</p>
      </div>
      <button type="button" class="sentinel-memory-pill" id="sentinel-memory-pill" aria-live="polite">memory (0)</button>
    </header>

    <div id="sentinel-chat-messages" class="sentinel-chat-scroll" aria-live="polite"></div>

    <div class="sentinel-chat-footer">
      <a href="privacy.html">Privacy Policy</a>
    </div>

    <div class="sentinel-input-bar">
      <input id="sentinel-chat-input" type="text" maxlength="4000" autocomplete="off" placeholder="Message Sentinel…" aria-label="Message">
      <button type="button" class="sentinel-send-btn" id="sentinel-chat-send">Send</button>
    </div>
  </div>

  <a class="sentinel-watermark" href="https://sentinelprime.org">sentinelprime.org</a>

  <script type="module" src="js/index-tesseract.js"></script>
  <script>
  (function () {
    var API = "https://jarvis-0sbo.onrender.com/api/chat";
    var intro = document.getElementById("sentinel-intro");
    var begin = document.getElementById("sentinel-begin");
    var chatRoot = document.getElementById("sentinel-chat-root");
    var win = document.getElementById("sentinel-chat-messages");
    var inp = document.getElementById("sentinel-chat-input");
    var btn = document.getElementById("sentinel-chat-send");
    var memoryPill = document.getElementById("sentinel-memory-pill");
    var conversationHistory = [];

    fetch("https://jarvis-0sbo.onrender.com/").catch(function () {});

    function updateMemoryPill() {
      memoryPill.textContent = "memory (" + conversationHistory.length + ")";
    }

    function scrollEnd() {
      win.scrollTop = win.scrollHeight;
    }

    function addBubbleUser(text) {
      var row = document.createElement("div");
      row.className = "ja-row ja-row--user";
      var b = document.createElement("div");
      b.className = "ja-bubble ja-bubble--user";
      b.textContent = text;
      row.appendChild(b);
      win.appendChild(row);
      scrollEnd();
    }

    function addBubbleAssistant(text) {
      var row = document.createElement("div");
      row.className = "ja-row ja-row--assistant";
      var b = document.createElement("div");
      b.className = "ja-bubble ja-bubble--assistant";
      var lab = document.createElement("span");
      lab.className = "ja-bubble__label";
      lab.textContent = "Sentinel";
      b.appendChild(lab);
      var body = document.createElement("div");
      body.className = "ja-bubble__body";
      body.textContent = text;
      b.appendChild(body);
      row.appendChild(b);
      win.appendChild(row);
      scrollEnd();
    }

    function setBusy(on) {
      inp.disabled = on;
      btn.disabled = on;
    }

    function offlineReply() {
      addBubbleAssistant("Sentinel is offline. Please try again later.");
    }

    begin.addEventListener("click", function () {
      intro.classList.add("sentinel-intro--exit");
      chatRoot.classList.add("is-active");
      chatRoot.setAttribute("aria-hidden", "false");
      window.setTimeout(function () {
        intro.setAttribute("hidden", "");
        inp.focus();
      }, 560);
    });

    function parseReply(r, bodyText) {
      var ct = (r.headers.get("content-type") || "").toLowerCase();
      if (ct.indexOf("application/json") !== -1) {
        try {
          var p = JSON.parse(bodyText);
          var reply =
            p.response != null
              ? p.response
              : p.message != null
                ? p.message
                : p.answer != null
                  ? p.answer
                  : p.text != null
                    ? p.text
                    : "";
          if (typeof reply !== "string") reply = reply == null ? "" : String(reply);
          return String(reply);
        } catch (e) {
          return bodyText;
        }
      }
      return bodyText;
    }

    async function postChat(userText) {
      var payload = {
        message: userText,
        conversationHistory: conversationHistory.slice()
      };
      var r = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json, text/plain" },
        body: JSON.stringify(payload)
      });
      var raw = await r.text();
      if (!r.ok) {
        throw new Error("offline");
      }
      return parseReply(r, raw);
    }

    async function send() {
      var msg = inp.value.trim();
      if (!msg) return;
      if (!chatRoot.classList.contains("is-active")) return;

      addBubbleUser(msg);
      inp.value = "";
      setBusy(true);
      try {
        var reply = await postChat(msg);
        addBubbleAssistant(reply);
        conversationHistory.push({ role: "user", content: msg });
        conversationHistory.push({ role: "assistant", content: reply });
        updateMemoryPill();
      } catch (e) {
        offlineReply();
      } finally {
        setBusy(false);
        inp.focus();
      }
    }

    btn.addEventListener("click", send);
    inp.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        send();
      }
    });

    addBubbleAssistant(
      "Hello. I am Sentinel, your AI assistant. How can I help you today?"
    );
    updateMemoryPill();
  })();
  </script>
</body>
</html>
