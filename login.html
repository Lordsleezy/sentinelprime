<!DOCTYPE html>
<html lang="en">
<head>
<title>Sentinel Prime Login &mdash; Customer Account Access</title>
<meta name="description" content="Sentinel Prime login gives customers private access to saved activation codes, subscription details, billing links, downloads, and support resources online.">
<link rel="canonical" href="https://sentinelprime.org/login">
<meta property="og:title" content="Sentinel Prime Login &mdash; Customer Account Access">
<meta property="og:description" content="Sentinel Prime login gives customers private access to saved activation codes, subscription details, billing links, downloads, and support resources online.">
<meta property="og:image" content="https://sentinelprime.org/assets/logo-tesseract.svg">
<meta property="og:url" content="https://sentinelprime.org/login">
<meta property="og:type" content="website">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="page.css">
</head>
<body data-page="login">
<div id="global-nav-mount"></div>
<main>
  <section class="section">
    <div class="wrap narrow form-panel">
      <h1>Sentinel Prime Customer Login</h1>
      <form id="loginForm">
        <input required type="email" name="email" placeholder="Email">
        <input required type="password" name="password" placeholder="Password">
        <button class="button" type="submit">Login</button>
        <div class="form-status" id="status"></div>
      </form>
      <p class="copy" style="margin-top:16px;"><a href="signup.html">Create account</a> · <a href="products.html">Purchase</a></p>
    </div>
  </section>
</main>
<script>
document.getElementById("loginForm").addEventListener("submit", async e => {
  e.preventDefault();
  const st = document.getElementById("status");
  const body = Object.fromEntries(new FormData(e.target));
  try {
    const r = await fetch("/api/auth/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || "Login failed");
    localStorage.setItem("sentinel_user_id", d.user_id);
    localStorage.setItem("sentinel_email", d.email);
    location.href = "dashboard.html";
  } catch (err) {
    st.className = "form-status error";
    st.textContent = err.message;
  }
});
</script>
