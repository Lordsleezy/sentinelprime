<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Sentinel Prime — general inquiries, business services, Guardian access, partnerships.">
  <title>Contact | Sentinel Prime</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index-landing.css">
  <script type="importmap">
  {
    "imports": {
      "three": "./js/lib/three.module.js",
      "three/addons/": "./js/lib/three-addons/"
    }
  }
  </script>
</head>
<body class="il-body" data-page="contact">
  <div id="webgl-root" aria-hidden="true"></div>
  <div class="il-wrap">
    <div id="site-header"></div>

    <main class="shell-main contact-shell">
      <div class="il-container contact-dark-grid il-reveal">
        <div>
          <p class="il-eyebrow">Contact</p>
          <h1 style="font-size:clamp(1.85rem,4vw,2.5rem);margin:0 0 1rem">Reach the team</h1>
          <p class="il-lead">We read every message. Choose a subject so the right thread gets priority.</p>
          <p style="margin-top:1.25rem;font-size:1.05rem">
            <strong style="color:#fff">Email:</strong><br>
            <a href="mailto:customerservice@sentinelprime.org" style="color:var(--il-cyan)">customerservice@sentinelprime.org</a>
          </p>
          <div class="contact-social">
            <a href="index.html">Home</a>
            <a href="products.html#personal-ai">Sentinel Personal AI</a>
          </div>
        </div>

        <form class="contact-dark-card" name="contact" method="POST" data-netlify="true">
          <input type="hidden" name="form-name" value="contact">
          <label for="c-name">Name</label>
          <input id="c-name" name="name" type="text" required autocomplete="name">

          <label for="c-email">Email</label>
          <input id="c-email" name="email" type="email" required autocomplete="email">

          <label for="c-subject">Subject</label>
          <select id="c-subject" name="subject" required>
            <option value="">Select…</option>
            <option value="General">General</option>
            <option value="Sentinel X Waitlist">Sentinel X Waitlist</option>
            <option value="Forge">Forge</option>
            <option value="Guardian Access Request">Guardian Access Request</option>
            <option value="Partnership">Partnership</option>
          </select>

          <label for="c-message">Message</label>
          <textarea id="c-message" name="message" required placeholder="How can we help?"></textarea>

          <button class="il-btn-primary" type="submit">Send</button>
        </form>
      </div>
    </main>

    <div id="site-footer"></div>
  </div>

  <script type="module" src="js/index-tesseract.js"></script>
  <script src="js/site-config.js"></script>
  <script src="js/components.js"></script>
  <script src="js/shell.js" defer></script>
  <script src="js/index-landing.js" defer></script>
</body>
</html>
