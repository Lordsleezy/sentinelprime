<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin - Sentinel Prime</title><meta name="robots" content="noindex,nofollow"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="page.css"></head><body><main><section class="page-hero"><div class="wrap narrow"><p class="eyebrow">Sentinel Prime Admin</p><h1>Activation control.</h1><p class="lead">Generate, inspect, and revoke Sentinel AI activation codes.</p></div></section><section class="section"><div class="wrap"><div class="form-panel" id="loginPanel"><p class="eyebrow">Admin Login</p><form id="adminLogin"><input required type="email" name="email" placeholder="Admin email"><input required type="password" name="password" placeholder="Password"><button class="button" type="submit">Login</button><button class="button secondary" id="forgot" type="button">Forgot Password?</button><div class="form-status" id="loginStatus"></div></form></div><div id="dashboard" class="hidden"><div class="grid-2"><div class="form-panel"><p class="eyebrow">Generate Code</p><form id="generate"><select required name="type"><option value="lifetime">Lifetime</option><option value="monthly">Monthly</option><option value="annual">Annual</option><option value="gift">Gift</option><option value="admin">Admin</option></select><input type="email" name="email" placeholder="Customer email (optional)"><textarea name="notes" placeholder="Notes (optional)"></textarea><button class="button" type="submit">Generate Code</button><div class="form-status" id="generateStatus"></div></form></div><div class="panel"><p class="eyebrow">Stats</p><div id="stats" class="copy">Loading...</div></div></div><div class="panel" style="margin-top:20px"><p class="eyebrow">Recent Codes</p><button class="button mini-button" id="refresh">Refresh</button><div class="table-wrap"><table><thead><tr><th>Code</th><th>Type</th><th>Status</th><th>Email</th><th>Action</th></tr></thead><tbody id="codes"></tbody></table></div></div></div></div></section></main><footer><div>&copy; 2026 Sentinel Prime Inc. - Restricted Access</div></footer><script>
const escapeHtml=value=>String(value||"").replace(/[&<>\"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char]));const loginPanel=document.getElementById("loginPanel"),dashboard=document.getElementById("dashboard"),loginStatus=document.getElementById("loginStatus"),generateStatus=document.getElementById("generateStatus");async function api(path,options={}){const response=await fetch(`/api/${path}`,{headers:{"Content-Type":"application/json"},...options});const data=await response.json();if(!response.ok)throw new Error(data.error||"Request failed");return data}async function refresh(){try{const data=await api("admin-codes");loginPanel.classList.add("hidden");dashboard.classList.remove("hidden");document.getElementById("stats").textContent=`Total codes: ${data.stats.total} | Active: ${data.stats.active} | Expired: ${data.stats.expired} | Monthly: ${data.stats.monthly} | Annual: ${data.stats.annual} | Lifetime: ${data.stats.lifetime}`;document.getElementById("codes").innerHTML=data.codes.map(code=>`<tr><td>${escapeHtml(code.code)}</td><td>${escapeHtml(code.type)}</td><td>${escapeHtml(code.status)}</td><td>${escapeHtml(code.email||"-")}</td><td>${["unused","active"].includes(code.status)?`<button class="button mini-button" data-revoke="${escapeHtml(code.id)}">Revoke</button>`:""}</td></tr>`).join("")||'<tr><td colspan="5">No codes yet.</td></tr>';document.querySelectorAll("[data-revoke]").forEach(button=>button.onclick=async()=>{await api("admin-revoke",{method:"POST",body:JSON.stringify({id:button.dataset.revoke})});refresh()})}catch(error){loginStatus.textContent=error.message}}document.getElementById("adminLogin").onsubmit=async event=>{event.preventDefault();try{await api("admin-login",{method:"POST",body:JSON.stringify(Object.fromEntries(new FormData(event.target)))});refresh()}catch(error){loginStatus.textContent=error.message}};document.getElementById("forgot").onclick=async()=>{const email=document.querySelector("#adminLogin [name=email]").value;await api("admin-forgot-password",{method:"POST",body:JSON.stringify({email})});loginStatus.textContent="If the address matches the configured administrator, a reset email is on the way."};document.getElementById("generate").onsubmit=async event=>{event.preventDefault();try{const data=await api("admin-generate",{method:"POST",body:JSON.stringify(Object.fromEntries(new FormData(event.target)))});generateStatus.textContent=`Generated: ${data.code}`;refresh()}catch(error){generateStatus.textContent=error.message}};document.getElementById("refresh").onclick=refresh;const resetToken=new URLSearchParams(location.search).get("reset");if(resetToken){const password=prompt("Enter a new admin password with at least 12 characters:");if(password)api("admin-reset-password",{method:"POST",body:JSON.stringify({token:resetToken,password})}).then(()=>loginStatus.textContent="Password updated. Login with the new password.").catch(error=>loginStatus.textContent=error.message)}refresh();
</script></body></html>
